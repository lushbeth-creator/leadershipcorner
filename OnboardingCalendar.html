<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#1a1a2e;padding:0}

.cal-wrap{display:grid;grid-template-columns:1fr 1fr;gap:28px}
@media (max-width:640px){.cal-wrap{grid-template-columns:1fr}}

/* ===== Calendar ===== */
.cal-card{background:transparent;padding:0;display:flex;flex-direction:column}
.cal-nav{display:flex;align-items:center;justify-content:space-between;width:386px;max-width:100%;margin:0 auto 1rem}
.cal-month{font-family:'Inter',sans-serif;font-weight:700;font-size:19px;color:#1B2F5B}
.cal-arrow{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.cal-arrow:hover svg{stroke:#5D70AE}
.cal-arrow svg{width:18px;height:18px;stroke:#59A398;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}

.cal-grid{display:grid;grid-template-columns:repeat(7,50px);gap:6px;justify-content:center}
.cal-dow{font-size:13px;font-weight:700;text-transform:uppercase;color:#888;text-align:center;padding:2px 0}
.cal-day{
  position:relative;width:50px;height:50px;display:flex;align-items:center;justify-content:center;
  font-size:18.5px;color:#444;border-radius:6px;border:1px solid transparent;background:none;
  font-family:'Inter',sans-serif;cursor:default;transition:background .15s,border-color .15s,color .15s;
}
.cal-day.blank{visibility:hidden}
.cal-day.has-event{cursor:pointer;color:#1B2F5B;font-weight:700}
.cal-day.has-event:hover{background:#DAF3EF;border-radius:50%}
.cal-day.selected{background:#59A398;color:#fff;border-radius:50%}
.cal-day .dot-row{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);display:flex;gap:3px}
.cal-day .dot{width:8px;height:8px;border-radius:50%;box-sizing:border-box;display:block}
.cal-day.selected .dot{background:#fff !important;border-color:#fff !important}

.cal-hint{font-size:13.5px;color:#59A398;font-weight:600;line-height:1.5;margin-top:16px;text-align:center}

.cal-legend{display:flex;flex-wrap:wrap;justify-content:center;gap:11px 16px;margin-top:18px;padding-top:14px;border-top:1px solid #d8dce8}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#555}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-sizing:border-box}

/* ===== Detail panel ===== */
.detail-card{background:transparent;padding:0;display:flex;flex-direction:column}
.detail-empty{display:none}
.detail-title{font-family:'Inter',sans-serif;font-weight:700;font-size:19px;color:#1B2F5B;margin-bottom:9px;text-wrap:balance;flex-shrink:0}
.detail-meta{display:flex;align-items:center;gap:6px;font-size:14px;color:#59A398;font-weight:600;margin-bottom:13px;flex-shrink:0}
.detail-meta svg{width:15px;height:15px;stroke:#59A398;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.detail-desc{font-size:14px;color:#444;line-height:1.6;margin-bottom:13px;max-height:320px;overflow-y:auto;padding-right:4px;flex-shrink:0}
.detail-desc p{margin-bottom:10px}
.detail-note{font-size:14px;color:#59A398;font-weight:700;line-height:1.5;margin-bottom:11px;flex-shrink:0}
.detail-actions{display:flex;flex-wrap:wrap;gap:9px;flex-shrink:0}
.detail-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:#5D70AE;color:#fff;border-radius:7px;padding:.7rem 1.15rem;text-decoration:none;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:700;transition:background .15s;
  cursor:pointer;border:none;
}
.detail-btn:hover{background:#59A398}
.detail-btn.secondary{background:#ffffff;color:#5D70AE;border:1px solid #A6B3D5}
.detail-btn.secondary:hover{background:#F3F6FF;color:#5D70AE}
</style>

function addCalUrl(subject, dateISO, startTime, endTime, offset, joinLink){

    + "&startdt=" + encodeURIComponent(start)
    + "&enddt=" + encodeURIComponent(end)

}

var dowNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function pad(n){ return n < 10 ? "0" + n : "" + n; }
function keyFor(y,m,d){ return y + "-" + pad(m+1) + "-" + pad(d); }

function todayISO(){
  var t = new Date();
  return t.getFullYear() + "-" + pad(t.getMonth() + 1) + "-" + pad(t.getDate());
}

// Onboarding-group events (welcome/training/tools/field) age into "past" automatically
// once their date has gone by, no manual status updates needed month to month.
function effectiveStatus(ev, key){
  if (ev.kind === "holiday") return ev.status;
  if (ev.status === "confirmed" && key < todayISO()) return "past";
  return ev.status;
}

function formatDate(key){
  var parts = key.split("-");
  var y = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10) - 1;
  var d = parseInt(parts[2], 10);
  return monthNames[m] + " " + d + ", " + y;
}

function renderDow(){
  var el = document.getElementById('cal-dow');
  var html = "";
  for (var i = 0; i < 7; i++) html += '<div class="cal-dow">' + dowNames[i] + '</div>';
  el.innerHTML = html;
}

function renderLegend(){
  var html = "";
  html += '<span class="legend-item"><span class="legend-dot" style="background:' + CAT_COLOR.welcome + '"></span>Onboarding Session</span>';
  html += '<span class="legend-item"><span class="legend-dot" style="background:' + CAT_COLOR.llo + '"></span>Learning Lift-Off</span>';
  html += '<span class="legend-item"><span class="legend-dot" style="background:' + CAT_COLOR.townhall + '"></span>Town Hall</span>';
  html += '<span class="legend-item"><span class="legend-dot" style="background:' + CAT_COLOR.holiday + '"></span>Company Holiday</span>';
  html += '<span class="legend-item"><span class="legend-dot" style="background:' + PAST_COLOR + '"></span>Past Trainings</span>';
  html += '<span class="legend-item"><span class="legend-dot" style="background:transparent;border:2px solid #888"></span>Coming Soon</span>';
  document.getElementById('cal-legend').innerHTML = html;
}

function renderCalendar(){
  document.getElementById('cal-month-label').textContent = monthNames[viewMonth] + " " + viewYear;
  var firstDow = new Date(viewYear, viewMonth, 1).getDay();
  var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  var grid = document.getElementById('cal-grid');
  var html = "";

  for (var b = 0; b < firstDow; b++) html += '<div class="cal-day blank"></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var key = keyFor(viewYear, viewMonth, d);
    var dayEvents = events[key] || [];
    var hasEvent = dayEvents.length > 0;
    var cls = "cal-day" + (hasEvent ? " has-event" : "") + (key === selectedKey ? " selected" : "");
    var marker = "";
    if (hasEvent) {
      var ev = dayEvents[0];
      var status = effectiveStatus(ev, key);
      var color = (status === "past") ? PAST_COLOR : CAT_COLOR[ev.kind];
      var isHollow = (status === "pending");
      var style = isHollow
        ? "background:transparent;border:2px solid " + color
        : "background:" + color + ";border:2px solid " + color;
      marker = '<span class="dot-row"><span class="dot" style="' + style + '"></span></span>';
    }
    var click = hasEvent ? ' onclick="selectDate(\'' + key + '\')"' : "";
    html += '<div class="' + cls + '"' + click + '>' + d + marker + '</div>';
  }

  grid.innerHTML = html;
}

function selectDate(key){
  selectedKey = key;
  renderCalendar();
  renderDetail(key);
}

function renderDetail(key){
  var dayEvents = events[key] || [];
  var card = document.getElementById('detail-card');
  var hint = document.getElementById('cal-hint');
  if (dayEvents.length === 0) {
    card.innerHTML = "";
    hint.style.display = "block";
    return;
  }
  hint.style.display = "none";

  var blocks = [];
  for (var i = 0; i < dayEvents.length; i++) {
    blocks.push(renderEventBlock(dayEvents[i], key));
  }
  card.innerHTML = blocks.join('<div style="border-top:1px solid #d8dce8;margin:16px 0;"></div>');
}

function renderEventBlock(ev, key){
  if (ev.kind === "holiday") {
    return '<p class="detail-title">' + ev.title + '</p>' +
      '<p class="detail-meta"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>' + formatDate(key) + '</p>' +
      '<p class="detail-note">' + ev.note + '</p>';
  }

  var status = effectiveStatus(ev, key);

  var descHtml = "";
  for (var i = 0; i < ev.description.length; i++) {
    descHtml += "<p>" + ev.description[i] + "</p>";
  }

  var metaText = (status === "past") ? formatDate(key) : (ev.time + ' \u2022 ' + formatDate(key));
  var metaHtml = '<p class="detail-meta"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>' + metaText + '</p>';

  var noteHtml = "";
  var actionsHtml = '<div class="detail-actions">';

  if (status === "past" && ev.recordingLink) {
    actionsHtml += '<a class="detail-btn" href="' + ev.recordingLink + '" target="_blank" rel="noopener">View Recording</a>';
    if (ev.deckLink) {
      actionsHtml += '<a class="detail-btn secondary" href="' + ev.deckLink + '" target="_blank" rel="noopener">View Deck</a>';
    }
  } else if (status === "past") {
    noteHtml = '<p class="detail-note">This session has already taken place.</p>';
  } else if (status === "pending") {
    noteHtml = '<p class="detail-note">' + (ev.kind === "llo" ? lloPendingNote : pendingNote) + '</p>';
    if (ev.mailto) {
      actionsHtml += '<a class="detail-btn secondary" href="' + ev.mailto + '">Email a topic idea</a>';
    }
  } else if (ev.join || ev.addCal) {
    if (ev.kind === "llo") {
      actionsHtml += '<a class="detail-btn" href="' + ev.join + '" target="_blank" rel="noopener">Register Here</a>';
    } else if (ev.kind === "townhall") {
      actionsHtml += '<a class="detail-btn" href="' + ev.join + '" target="_blank" rel="noopener">Register</a>';
    } else if (ev.addCal) {
      actionsHtml += '<a class="detail-btn" href="' + ev.addCal + '" target="_blank" rel="noopener">Add to Calendar</a>';
    }
    if (ev.mailto) {
      actionsHtml += '<a class="detail-btn secondary" href="' + ev.mailto + '">Email a topic idea</a>';
    }
  }
  if (ev.bookingLink) {
    actionsHtml += '<a class="detail-btn" href="' + ev.bookingLink + '" target="_blank" rel="noopener">Schedule Time</a>';
  }
  actionsHtml += '</div>';

  return '<p class="detail-title">' + ev.title + '</p>' +
    metaHtml +
    '<div class="detail-desc">' + descHtml + '</div>' +
    noteHtml +
    actionsHtml;
}

function shiftMonth(dir){
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
  renderDetail(selectedKey);
}

renderDow();
renderLegend();
renderCalendar();
</script>
</body>
</html>
